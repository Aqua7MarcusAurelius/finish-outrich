services:

  app:
    build: .
    container_name: tgf_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./:/app
    restart: unless-stopped

  # ── Web UI (модуль ui_web) ────────────────────────────────────────────
  # Изолированный Node-контейнер, запускает Vite dev-сервер на :3000.
  # Ходит на FastAPI через docker-сеть (http://app:8000) — см. vite.config.ts.
  # Падение UI не влияет на app / воркеры: это отдельный сервис без общего state.
  ui:
    build: ./modules/ui_web
    container_name: tgf_ui
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://app:8000
    volumes:
      - ./modules/ui_web:/app
      # именованный том хранит node_modules, чтобы bind-mount не затирал их
      - ui_node_modules:/app/node_modules
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: tgf_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: tgf_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: tgf_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9001:9001"   # веб-консоль
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ui_node_modules:
